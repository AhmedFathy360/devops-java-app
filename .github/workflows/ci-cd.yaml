name: Build and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:
    
jobs:
  build-and-deploy:

    runs-on: [self-hosted, linux]

    steps:

      - name: Checkout Application Repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Build Java Application
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t perdita997/devops-java-app:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push perdita997/devops-java-app:${{ github.sha }}

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Setup Kubernetes Config
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Clone Helm Repository
        run: |
          git clone https://github.com/AhmedFathy360/devops-java-helm.git

      - name: Deploy Application via Helm
        run: |
          helm upgrade --install java-app ./devops-java-helm/java-app-helm-chart \
            --namespace dev \
            --create-namespace \
            --set image.repository=perdita997/devops-java-app \
            --set image.tag=${{ github.sha }}